name: CI
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true
            - name: Run tests
              run: go test ./... -count=1 -race -timeout 120s

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true
            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v7
              with:
                  version: v2.12.2
                  args: --timeout=5m

    security:
        name: Security
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true
            - name: Run gosec
              uses: securego/gosec@master
              with:
                  args: -exclude-dir=vendor ./...

    vuln:
        name: Vulnerability Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true
            - name: Run govulncheck
              run: |
                  go install golang.org/x/vuln/cmd/govulncheck@latest
                  govulncheck ./...

