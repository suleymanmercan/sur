name: Release

on:
    push:
        tags:
            - "v*"
permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.22"

            - name: Build binaries
              run: |
                  GOOS=linux GOARCH=amd64 go build -o ../sur-linux-amd64 .
                  GOOS=linux GOARCH=arm64 go build -o ../sur-linux-arm64 .

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      sur-linux-amd64
                      sur-linux-arm64
