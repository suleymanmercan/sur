version: "2"

run:
    timeout: 5m

linters:
    default: none # eski disable-all'ın karşılığı
    enable:
        - errcheck
        - gosimple
        - govet
        - ineffassign
        - staticcheck
        - unused
        - misspell
        - bodyclose
        - nilerr
    settings:
        errcheck:
            check-blank: false
        govet:
            enable-all: true
            disable:
                - shadow
                - fieldalignment
        misspell:
            locale: US
    exclusions:
        rules:
            - path: "_test\\.go"
              linters:
                  - errcheck
                  - bodyclose

formatters:
    enable:
        - gofmt # gofmt artık formatter section'a taşındı
