services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${API_PORT}:9000"
      - "${BIND_HOST}:${CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${ROOT_USER}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/root_password
    secrets:
      - root_password
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

secrets:
  root_password:
    file: ./secrets/root_password.txt
