services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${USERNAME}
      MYSQL_PASSWORD_FILE: /run/secrets/password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/root_password
    secrets:
      - password
      - root_password
    volumes:
      - ./data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password-file=/run/secrets/root_password"]
      interval: 10s
      timeout: 5s
      retries: 5

secrets:
  password:
    file: ./secrets/password.txt
  root_password:
    file: ./secrets/root_password.txt
