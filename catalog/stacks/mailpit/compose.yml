services:
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${SMTP_PORT}:1025"
      - "${BIND_HOST}:${UI_PORT}:8025"
    volumes:
      - ./data:/data
    environment:
      MP_DATA_FILE: /data/mailpit.db
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
