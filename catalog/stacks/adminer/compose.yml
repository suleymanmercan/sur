services:
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${BIND_HOST}:${PORT}:8080"
    environment:
      ADMINER_DESIGN: ${DESIGN}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
