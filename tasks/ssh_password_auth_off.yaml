id: ssh_password_auth_off
name: "Disable SSH password authentication"
description: "Forces key-based auth by setting PasswordAuthentication no."
rollback_possible: true
backup_files:
  - /etc/ssh/sshd_config
risk_level: medium
distros: [ubuntu, debian, rocky, alma, fedora]

pre_check:
  command: "! (sshd -T 2>/dev/null | grep -Eiq '^passwordauthentication[[:space:]]+no\\b' || grep -Eiq '^[[:space:]]*PasswordAuthentication[[:space:]]+no\\b' /etc/ssh/sshd_config)"
  expect_exit: 0

exec:
  - command: "grep -Eiq '^[#[:space:]]*PasswordAuthentication[[:space:]]+' /etc/ssh/sshd_config && sed -ri 's/^[#[:space:]]*PasswordAuthentication[[:space:]]+.*/PasswordAuthentication no/' /etc/ssh/sshd_config || printf '\\nPasswordAuthentication no\\n' >> /etc/ssh/sshd_config"
  - command: "sshd -t"
  - command: "systemctl restart ssh 2>/dev/null || systemctl restart sshd"

post_check:
  command: "grep -Eiq '^[[:space:]]*PasswordAuthentication[[:space:]]+no\\b' /etc/ssh/sshd_config"
  expect_exit: 0

rollback:
  - command: "cp {backup_path} /etc/ssh/sshd_config"
  - command: "systemctl restart ssh 2>/dev/null || systemctl restart sshd"
