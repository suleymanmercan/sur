id: ssh_password_auth_off
name: "Disable SSH password authentication"
description: "Forces key-based auth by setting PasswordAuthentication no."
rollback_possible: true
backup_files:
  - /etc/ssh/sshd_config
risk_level: medium
distros: [ubuntu, debian, rocky, alma, fedora]

pre_check:
  command: "grep -Eiq '^[#[:space:]]*PasswordAuthentication[[:space:]]+yes' /etc/ssh/sshd_config"
  expect_exit: 0

exec:
  - command: "sed -ri 's/^#?\\s*PasswordAuthentication\\s+.*/PasswordAuthentication no/' /etc/ssh/sshd_config"
  - command: "systemctl restart ssh 2>/dev/null || systemctl restart sshd"

post_check:
  command: "grep -Eq '^PasswordAuthentication[[:space:]]+no' /etc/ssh/sshd_config"
  expect_exit: 0

rollback:
  - command: "cp {backup_path} /etc/ssh/sshd_config"
  - command: "systemctl restart ssh 2>/dev/null || systemctl restart sshd"
