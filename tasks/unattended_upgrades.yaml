id: unattended_upgrades
name: "Enable automatic security updates"
description: "Configures unattended-upgrades on Debian/Ubuntu so security patches install automatically."
rollback_possible: true
backup_files:
  - /etc/apt/apt.conf.d/20auto-upgrades
risk_level: low
distros: [ubuntu, debian]

pre_check:
  command: "command -v apt-get >/dev/null 2>&1 && ! grep -q 'Unattended-Upgrade \"1\"' /etc/apt/apt.conf.d/20auto-upgrades 2>/dev/null"
  expect_exit: 0

exec:
  - command: "DEBIAN_FRONTEND=noninteractive apt-get update"
  - command: "DEBIAN_FRONTEND=noninteractive apt-get install -y unattended-upgrades"
  - command: "printf 'APT::Periodic::Update-Package-Lists \"1\";\\nAPT::Periodic::Unattended-Upgrade \"1\";\\n' > /etc/apt/apt.conf.d/20auto-upgrades"

post_check:
  command: "grep -q 'Unattended-Upgrade \"1\"' /etc/apt/apt.conf.d/20auto-upgrades"
  expect_exit: 0

rollback:
  - command: "test -n \"{backup_path}\" || rm -f /etc/apt/apt.conf.d/20auto-upgrades"
