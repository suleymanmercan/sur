id: enable_ufw
name: "Enable UFW with basic rules"
description: "Installs UFW when needed, allows SSH, and enables UFW. Warning: closes all other inbound traffic."
rollback_possible: false
backup_files: []
risk_level: high
distros: [ubuntu, debian]

pre_check:
  command: "! (command -v ufw >/dev/null 2>&1 && ufw status | grep -qi 'Status: active')"
  expect_exit: 0

exec:
  - command: "command -v ufw >/dev/null 2>&1 || (DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y ufw)"
  - command: "ufw allow OpenSSH || ufw allow 22/tcp"
  - command: "ufw --force enable"

post_check:
  command: "ufw status | grep -qi 'Status: active'"
  expect_exit: 0

rollback:
  - command: "ufw --force disable"
